name: Deploy to Firebase Hosting

on:
  push:
    branches:
      - main

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Firebase Hosting
        run: |
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT_LOF_HEIST }}' > /tmp/sa-key.json
          npx firebase-tools@latest deploy --only hosting --project lof-heist --non-interactive
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/sa-key.json
